<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Flipkart</a>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for products, brands and more">
            <button onclick="searchProduct()">Search</button>
        </div>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="#" onclick="addToCart()">
                Cart (<span id="cartCount">0</span>)
            </a>
            <a href="more.html">More</a>
        </div>
    </header>

    <section class="categories">
        <a href="#" class="category">Mobiles</a>
        <a href="#" class="category">Fashion</a>
        <a href="#" class="category">Electronics</a>
        <a href="#" class="category">Home</a>
        <a href="#" class="category">Appliances</a>
        <a href="#" class="category">Travel</a>
    </section>

    <section class="banner">
        <h2>Big Billion Days Sale</h2>
        <p>Best Deals on Electronics</p>
        <button class="banner-btn" onclick="showOffer()">
            Shop Now
        </button>
    </section>

    <section class="products">

        <div class="product-card">
            <h3>Smartphone</h3>
            <p>₹29,999</p>
            <button onclick="addToCart()">Add To Cart</button>
        </div>

        <div class="product-card">
            <h3>Laptop</h3>
            <p>₹64,999</p>
            <button onclick="addToCart()">Add To Cart</button>
        </div>

        <div class="product-card">
            <h3>Headphones</h3>
            <p>₹1,999</p>
            <button onclick="addToCart()">Add To Cart</button>
        </div>

        <div class="product-card">
            <h3>Smart TV</h3>
            <p>₹29,999</p>
            <button onclick="addToCart()">Add To Cart</button>
        </div>

    </section>
    <footer style="text-align:center; padding:20px;">
        <p>© 2026 Flipkart Clone</p>
    </footer>
    <script>
        function searchProduct() {
            let product = document.getElementById("searchInput").value;
            if (product.trim() === "") {
                alert("Please enter a product name");
            } else {
                alert("Searching for: " + product);
            }
        }
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById("cartCount").innerText = count;
            alert("Product Added To Cart!");
        }
        function showOffer() {
            alert("Welcome to Big Billion Days Sale! Up to 80% OFF.");
        }
    </script>
</body>
</html>
